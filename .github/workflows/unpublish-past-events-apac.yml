name: APAC Unpublish Past Events
on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '10 8 * * *' # run at 5:10PM for APAC
  workflow_dispatch:

jobs:
  unpublish:
    environment:
      name: main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Run Script
        id: unpublish-script
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        uses: actions/github-script@v7
        with:
          script: |
            const { default: unpublishPastEvents } = await import('${{ github.workspace }}/scripts/unpublish-pages.mjs')

            const response = await unpublishPastEvents(process.env.AUTH_TOKEN, "APAC")
            core.setOutput("subject", response.subject)
            core.setOutput("body", response.body)
            return response
          result-encoding: string
      - name: Send All Email Notification
        uses: cinotify/github-action@main
        with:
          to: 'Laurel.Timko@jmp.com'
          subject: "Nightly Job Run for APAC"
          body: "${{steps.unpublish-script.outputs.body}}"
          type: 'text/html'
      - name: Send Failure Email Notifications
        if: ${{ steps.unpublish-script.outputs.sendEmail == 'true' }}
        uses: cinotify/github-action@main
        with:
          to: 'Laurel.Timko@jmp.com, Aaron.Kennedy@jmp.com, Roger.Alford@jmp.com, Michael.Osinibi@jmp.com'
          subject: "${{steps.unpublish-script.outputs.subject}}"
          body: "${{steps.unpublish-script.outputs.body}}"
          type: 'text/html'